version: '3.9'

# ═══════════════════════════════════════════════════════════════════════════════
# LyraWorks 3D – Docker Compose
# Contenedores: App Laravel, MySQL, Redis, Evolution API (WhatsApp)
# ═══════════════════════════════════════════════════════════════════════════════

services:

  # ─── App: PHP-FPM (Laravel) ─────────────────────────────────────────────────
  lyraworks-3d:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: lyraworks-3d
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/local.ini
    environment:
      APP_ENV: local
      DB_HOST: lyraworks_3d
      DB_PORT: 3306
      DB_DATABASE: lyraworks_3d
      DB_USERNAME: lyraworks
      DB_PASSWORD: secret
      REDIS_HOST: lyraworks-redis
      REDIS_PORT: 6379
      QUEUE_CONNECTION: database
      EVOLUTION_API_URL: http://evolution-api:8080
      EVOLUTION_INSTANCE: LyraWorks
    depends_on:
      lyraworks_3d:
        condition: service_healthy
      lyraworks-redis:
        condition: service_started
    networks:
      - lyraworks-network

  # ─── Web Server: Nginx ────────────────────────────────────────────────────────
  lyraworks-nginx:
    image: nginx:alpine
    container_name: lyraworks-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - lyraworks-3d
    networks:
      - lyraworks-network

  # ─── MySQL ────────────────────────────────────────────────────────────────────
  lyraworks_3d:
    image: mysql:8.0
    container_name: lyraworks_3d
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: lyraworks_3d
      MYSQL_USER: lyraworks
      MYSQL_PASSWORD: secret
    ports:
      - "3307:3306"
    volumes:
      - lyraworks_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "lyraworks", "-psecret"]
      interval: 10s
      retries: 5
      start_period: 30s
    networks:
      - lyraworks-network

  # ─── Redis (Queue + Cache) ────────────────────────────────────────────────────
  lyraworks-redis:
    image: redis:alpine
    container_name: lyraworks-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    networks:
      - lyraworks-network

  # ─── Queue Worker ─────────────────────────────────────────────────────────────
  lyraworks-queue:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: lyraworks-queue
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    volumes:
      - .:/var/www/html
    environment:
      APP_ENV: local
      DB_HOST: lyraworks_3d
      DB_DATABASE: lyraworks_3d
      DB_USERNAME: lyraworks
      DB_PASSWORD: secret
      REDIS_HOST: lyraworks-redis
      QUEUE_CONNECTION: database
      EVOLUTION_API_URL: http://evolution-api:8080
    depends_on:
      lyraworks_3d:
        condition: service_healthy
    networks:
      - lyraworks-network

  # ─── Laravel Scheduler ────────────────────────────────────────────────────────
  lyraworks-scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: lyraworks-scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    command: >
      sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    volumes:
      - .:/var/www/html
    environment:
      APP_ENV: local
      DB_HOST: lyraworks_3d
      DB_DATABASE: lyraworks_3d
      DB_USERNAME: lyraworks
      DB_PASSWORD: secret
      REDIS_HOST: lyraworks-redis
      EVOLUTION_API_URL: http://evolution-api:8080
    depends_on:
      lyraworks_3d:
        condition: service_healthy
    networks:
      - lyraworks-network

  # ─── Evolution API v2 (WhatsApp Bridge) ──────────────────────────────────────
  evolution-api:
    image: evoapicloud/evolution-api:latest
    container_name: evolution-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SERVER_URL=http://localhost:8080
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY:-lyraworks-evo-key-2024}
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://evolution:evopassword@evolution-db:5432/evolution?sslmode=disable
      - DATABASE_SAVE_DATA_INSTANCE=true
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://evolution-redis:6379
      - INSTANCE_INTERVAL=5000
      - INSTANCE_SEND_PRESENCE=true
    depends_on:
      - evolution-db
      - evolution-redis
    volumes:
      - evolution_instances:/evolution/instances
    networks:
      - lyraworks-network

  # ─── Evolution Manager (Panel Web QR) ────────────────────────────────────────
  evolution-manager:
    image: evoapicloud/evolution-manager:latest
    container_name: evolution-manager
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - evolution-api
    networks:
      - lyraworks-network

  # ─── PostgreSQL para Evolution API ───────────────────────────────────────────
  evolution-db:
    image: postgres:15-alpine
    container_name: evolution-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=evolution
      - POSTGRES_PASSWORD=evopassword
      - POSTGRES_DB=evolution
    volumes:
      - evolution_postgres_data:/var/lib/postgresql/data
    networks:
      - lyraworks-network

  # ─── Redis para Evolution API ─────────────────────────────────────────────────
  evolution-redis:
    image: redis:alpine
    container_name: evolution-redis
    restart: unless-stopped
    networks:
      - lyraworks-network

# ═══════════════════════════════════════════════════════════════════════════════
# Redes y Volúmenes
# ═══════════════════════════════════════════════════════════════════════════════
networks:
  lyraworks-network:
    driver: bridge

volumes:
  lyraworks_mysql_data:
  evolution_postgres_data:
  evolution_instances:
